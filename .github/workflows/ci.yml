name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  lint-yaml:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: |
          yamllint -d '{
            extends: default,
            rules: {
              line-length: {max: 120},
              truthy: disable,
              comments: disable,
              commas: disable,
              comments-indentation: false
            }
          }' \
            prometheus/prometheus.yml \
            prometheus/rules/ \
            alertmanager/alertmanager.yml \
            blackbox/blackbox.yml \
            grafana/provisioning/datasources/ \
            grafana/provisioning/dashboards/dashboard.yml \
            docker-compose.yml

  validate-configs:
    name: Validate Configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Prometheus config
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/prometheus:/prometheus \
            prom/prometheus:v2.51.2 \
            promtool check config /prometheus/prometheus.yml

      - name: Validate alert rules
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/prometheus/rules:/rules \
            prom/prometheus:v2.51.2 \
            promtool check rules /rules/alerts.yml /rules/recording_rules.yml

      - name: Validate Alertmanager config
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/alertmanager:/alertmanager \
            prom/alertmanager:v0.27.0 \
            amtool check-config /alertmanager/alertmanager.yml

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Install dependencies
        run: pip install -r tests/requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [lint-yaml, validate-configs, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env

      - name: Start stack
        run: docker compose up -d

      - name: Wait for services
        run: |
          echo "Waiting for Prometheus..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9090/-/healthy; then
              echo "Prometheus healthy"
              break
            fi
            sleep 3
          done

          echo "Waiting for Grafana..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health; then
              echo "Grafana healthy"
              break
            fi
            sleep 3
          done

          echo "Waiting for Alertmanager..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:9093/-/healthy; then
              echo "Alertmanager healthy"
              break
            fi
            sleep 3
          done

      - name: Check all services healthy
        run: |
          curl -sf http://localhost:9090/-/healthy || (echo "Prometheus unhealthy" && exit 1)
          curl -sf http://localhost:3000/api/health || (echo "Grafana unhealthy" && exit 1)
          curl -sf http://localhost:9093/-/healthy || (echo "Alertmanager unhealthy" && exit 1)
          curl -sf http://localhost:9100/metrics > /dev/null || (echo "Node exporter unhealthy" && exit 1)
          curl -sf http://localhost:9115/health || (echo "Blackbox unhealthy" && exit 1)
          echo "All services healthy!"

      - name: Verify Prometheus scrape targets
        run: |
          sleep 15
          TARGETS=$(curl -sf http://localhost:9090/api/v1/targets | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          active = data['data']['activeTargets']
          up = [t for t in active if t['health'] == 'up']
          print(f'Targets up: {len(up)}/{len(active)}')
          for t in active:
            print(f'  {t[\"labels\"].get(\"job\",\"?\")} - {t[\"health\"]}')
          ")
          echo "$TARGETS"

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop stack
        if: always()
        run: docker compose down -v
