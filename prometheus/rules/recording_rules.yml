groups:
  - name: node.recording
    interval: 30s
    rules:
      - record: instance:node_cpu_utilisation:rate5m
        expr: |
          100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)

      - record: instance:node_memory_utilisation:ratio
        expr: |
          1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)

      - record: instance:node_disk_utilisation:ratio
        expr: |
          1 - (
            avg by(instance) (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|aufs"})
            / avg by(instance) (node_filesystem_size_bytes{fstype!~"tmpfs|overlay|aufs"})
          )

      - record: instance:node_network_receive_bytes:rate5m
        expr: sum by(instance) (rate(node_network_receive_bytes_total{device!~"lo|veth.*"}[5m]))

      - record: instance:node_network_transmit_bytes:rate5m
        expr: sum by(instance) (rate(node_network_transmit_bytes_total{device!~"lo|veth.*"}[5m]))

  - name: blackbox.recording
    interval: 30s
    rules:
      - record: job:probe_success:avg
        expr: avg by(job) (probe_success)

      - record: instance:probe_duration_seconds:avg5m
        expr: avg_over_time(probe_duration_seconds[5m])
