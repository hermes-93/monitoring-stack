global:
  resolve_timeout: 5m
  smtp_smarthost: "smtp.example.com:587"
  smtp_from: "alerts@example.com"
  smtp_require_tls: true

templates:
  - /etc/alertmanager/templates/*.tmpl

route:
  group_by:
    - alertname
    - cluster
    - env
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default

  routes:
    - match:
        severity: critical
      receiver: critical
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    - match:
        severity: warning
      receiver: warning
      repeat_interval: 4h

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal:
      - alertname
      - instance

receivers:
  - name: default
    webhook_configs:
      - url: "http://localhost:5001"
        send_resolved: true

  - name: critical
    webhook_configs:
      - url: "${ALERTMANAGER_SLACK_WEBHOOK:-http://localhost:5001}"
        send_resolved: true
        http_config:
          follow_redirects: true
        max_alerts: 10

  - name: warning
    webhook_configs:
      - url: "${ALERTMANAGER_SLACK_WEBHOOK:-http://localhost:5001}"
        send_resolved: true
        max_alerts: 20
